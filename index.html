<body class="min-h-screen text-gray-800">

<div class="max-w-7xl mx-auto p-6">

  <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-8">

    <div>
      <h1 class="text-5xl font-black text-rose-600">Wedding HQ</h1>

  <div class="grid lg:grid-cols-3 gap-6 mb-8">

    <div class="glass rounded-3xl p-6 shadow-lg">

  <div class="grid lg:grid-cols-2 gap-8">

<!-- TASK MODAL -->

<div id="taskModal"
  class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-6 z-50">

  <div class="bg-white rounded-3xl p-6 w-full max-w-lg">

    <h2 class="text-3xl font-black mb-6">Add Wedding Task</h2>

    <div class="space-y-4">

      <input id="taskTitle"
        class="w-full border rounded-2xl p-3"
        placeholder="Task Title">

      <input id="taskCategory"
        class="w-full border rounded-2xl p-3"
        placeholder="Category">

      <input id="taskDeadline"
        type="date"
        class="w-full border rounded-2xl p-3">

      <select id="taskPriority"
        class="w-full border rounded-2xl p-3">

        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
        <option>Critical</option>

      </select>

      <select id="taskStatus"
        class="w-full border rounded-2xl p-3">

        <option>Not Started</option>
        <option>Researching</option>
        <option>Waiting</option>
        <option>In Progress</option>
        <option>Almost Done</option>
        <option>Completed</option>

      </select>

      <input id="taskProgress"
        type="range"
        min="0"
        max="100"
        value="0"
        class="w-full">

      <div class="flex gap-4">

        <button onclick="addTask()"
          class="bg-rose-500 text-white flex-1 py-3 rounded-2xl">
          Save Task
        </button>

        <button onclick="hideTaskModal()"
          class="bg-gray-200 flex-1 py-3 rounded-2xl">

  </div>

<!-- VENDOR MODAL -->

<div id="vendorModal"
  class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-6 z-50">

  <div class="bg-white rounded-3xl p-6 w-full max-w-lg">

    <h2 class="text-3xl font-black mb-6">Add Vendor</h2>

    <div class="space-y-4">

      <input id="vendorName"
        class="w-full border rounded-2xl p-3"

      <input id="vendorCategory"
        class="w-full border rounded-2xl p-3"
        placeholder="Category">

      <input id="vendorContact"
        class="w-full border rounded-2xl p-3"
        placeholder="Contact Person">

      <input id="vendorEmail"
        class="w-full border rounded-2xl p-3"
        placeholder="Email">

      <input id="vendorPhone"
        class="w-full border rounded-2xl p-3"
        placeholder="Phone">

      <input id="vendorDeposit"
        class="w-full border rounded-2xl p-3"
        placeholder="Deposit Amount">

      <div class="flex gap-4">

        <button onclick="addVendor()"
          class="bg-rose-500 text-white flex-1 py-3 rounded-2xl">
          Save Vendor
        </button>

        <button onclick="hideVendorModal()"
          class="bg-gray-200 flex-1 py-3 rounded-2xl">
          Cancel
        </button>

      </div>

    </div>

  </div>

<script>

/*
REALTIME DATABASE RULES:

{
  "rules": {
    ".read": true,
    ".write": true
  }
}
*/

const firebaseConfig = {

  apiKey: "AIzaSyBMcWHdQxCDe6lcq184A0Be7hhTrTqHba8",

  authDomain: "wedding-planning-e89c7.firebaseapp.com",

  databaseURL: "https://wedding-planning-e89c7-default-rtdb.firebaseio.com",

  projectId: "wedding-planning-e89c7",

  storageBucket: "wedding-planning-e89c7.appspot.com",

  messagingSenderId: "101109655856",

  appId: "1:101109655856:web:dc3934ec574f65ddd840f5"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const tasksRef = db.ref("tasks");
const vendorsRef = db.ref("vendors");

let tasks = [];
let vendors = [];

/* SEEDED TASKS */

const seededTasks = [

{
  title: "Marriage license appointment",
  category: "Legal",
  deadline: "2026-06-10",
  priority: "Critical",
  status: "Not Started",
  progress: 0
},

{
  title: "Order welcome sign",
  category: "Decor",
  deadline: "2026-06-12",
  priority: "Medium",
  status: "Not Started",
  progress: 0
}

];

/* COUNTDOWN */

function updateCountdown() {

  const weddingDate = new Date("2026-07-09");
  const today = new Date();

  const diff = weddingDate - today;

  const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

  document.getElementById("countdown").textContent = days + " Days";
}

updateCountdown();

/* MODALS */

function showTaskModal() {
  document.getElementById("taskModal").classList.remove("hidden");
}

function hideTaskModal() {
  document.getElementById("taskModal").classList.add("hidden");
}

function showVendorModal() {
  document.getElementById("vendorModal").classList.remove("hidden");
}

function hideVendorModal() {
  document.getElementById("vendorModal").classList.add("hidden");
}

/* REALTIME LISTENERS */

tasksRef.on("value", (snapshot) => {

  const data = snapshot.val();

  tasks = [];

  if(data) {

    Object.keys(data).forEach((key) => {

      tasks.push({
        id: key,
        ...data[key]
      });

    });

  }

  renderTasks();

});

vendorsRef.on("value", (snapshot) => {

  const data = snapshot.val();

  vendors = [];

  if(data) {

    Object.keys(data).forEach((key) => {

      vendors.push({
        id: key,
        ...data[key]
      });

    });

  }

  renderVendors();

});

/* SEED DATABASE */

tasksRef.once("value", (snapshot) => {

  if(!snapshot.exists()) {

    seededTasks.forEach((task) => {

      tasksRef.push(task);

    });

  }

});

/* RENDER TASKS */

function renderTasks() {

  const container = document.getElementById("taskList");

  container.innerHTML = "";

  tasks.sort((a,b) =>
    new Date(a.deadline) - new Date(b.deadline)
  );

  tasks.forEach((task) => {

    const div = document.createElement("div");

    div.className = "bg-white rounded-2xl p-5 shadow";

    div.innerHTML = `

      <div class="flex justify-between items-start">

        <div>

          <h3 class="text-xl font-bold">${task.title}</h3>

          <p class="text-gray-500">${task.category}</p>

          <p class="text-sm mt-2">
            Deadline: ${task.deadline}
          </p>

          <p class="text-sm">
            Priority: ${task.priority}
          </p>

          <p class="text-sm">
            Status: ${task.status}
          </p>

        </div>

        <button
          onclick="deleteTask('${task.id}')"
          class="text-red-500 font-bold">
          ✕
        </button>

      </div>

      <div class="mt-4 w-full bg-gray-200 rounded-full h-3">

        <div
          class="bg-rose-500 h-3 rounded-full"
          style="width:${task.progress}%">
        </div>

      </div>

      <p class="text-sm mt-2">
        ${task.progress}% Complete
      </p>

    `;

    container.appendChild(div);

  });

  updateStats();

  renderUpcoming();
}

/* RENDER VENDORS */

function renderVendors() {

  const container = document.getElementById("vendorList");

  container.innerHTML = "";

  vendors.forEach((vendor) => {

    const div = document.createElement("div");

    div.className = "bg-white rounded-2xl p-5 shadow";

    div.innerHTML = `

      <div class="flex justify-between items-start">

        <div>

          <h3 class="text-xl font-bold">${vendor.name}</h3>

          <p class="text-gray-500">${vendor.category}</p>

          <p class="text-sm mt-2">${vendor.contact}</p>

          <p class="text-sm">${vendor.email}</p>

          <p class="text-sm">${vendor.phone}</p>

        </div>

        <button
          onclick="deleteVendor('${vendor.id}')"
          class="text-red-500 font-bold">
          ✕
        </button>

      </div>

    `;

    container.appendChild(div);

  });

  document.getElementById("vendorCount").textContent =
    vendors.length;
}

/* STATS */

function updateStats() {

  const completed =
    tasks.filter(t => t.progress >= 100).length;

  const percent =
    tasks.length > 0
      ? Math.round((completed / tasks.length) * 100)
      : 0;

  document.getElementById("taskCount").textContent =
    tasks.length;

  document.getElementById("completedCount").textContent =
    completed;

  document.getElementById("progressBar").style.width =
    percent + "%";

  document.getElementById("progressText").textContent =
    percent + "% Complete";
}

/* UPCOMING */

function renderUpcoming() {

  const upcoming = [...tasks]
    .filter(t => t.progress < 100)
    .slice(0,5);

  document.getElementById("upcomingList").innerHTML =
    upcoming.map(task => `

      <li class="bg-white rounded-xl p-3 shadow-sm">

        <strong>${task.title}</strong><br>

        <span class="text-gray-500 text-sm">
          ${task.deadline}
        </span>

      </li>

    `).join("");
}

/* ADD TASK */

async function addTask() {

  try {

    const task = {

      title: document.getElementById("taskTitle").value,

      category: document.getElementById("taskCategory").value,

      deadline: document.getElementById("taskDeadline").value,

      priority: document.getElementById("taskPriority").value,

      status: document.getElementById("taskStatus").value,

      progress: Number(
        document.getElementById("taskProgress").value
      )

    };

    if(!task.title) {

      alert("Please enter a task title.");
      return;
    }

    await tasksRef.push(task);

    alert("Task saved!");

    hideTaskModal();

  } catch(error) {

    console.error(error);

    alert("Firebase Error: " + error.message);
  }
}

/* ADD VENDOR */

async function addVendor() {

  try {

    const vendor = {

      name: document.getElementById("vendorName").value,

      category: document.getElementById("vendorCategory").value,

      contact: document.getElementById("vendorContact").value,

      email: document.getElementById("vendorEmail").value,

      phone: document.getElementById("vendorPhone").value,

      deposit: document.getElementById("vendorDeposit").value

    };

    if(!vendor.name) {

      alert("Please enter a vendor name.");
      return;
    }

    await vendorsRef.push(vendor);

    alert("Vendor saved!");

    hideVendorModal();

  } catch(error) {

    console.error(error);

    alert("Firebase Error: " + error.message);
  }
}

/* DELETE TASK */

async function deleteTask(id) {

  await tasksRef.child(id).remove();
}

/* DELETE VENDOR */

async function deleteVendor(id) {

  await vendorsRef.child(id).remove();
}

</script>
