<body class="min-h-screen text-gray-800">

<div class="max-w-7xl mx-auto p-6">

  <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-8">

    <div>
      <h1 class="text-5xl font-black text-rose-600">Wedding HQ</h1>
      <p class="text-gray-500 mt-2">Firebase Realtime Database Wedding Planner</p>
    </div>

    <div class="glass rounded-3xl shadow-xl p-6 text-center">
      <p class="uppercase text-xs tracking-widest text-gray-500">Countdown</p>
      <h2 id="countdown" class="text-5xl font-black text-rose-500 mt-2"></h2>
      <p class="text-gray-500">until July 9, 2026</p>
    </div>

  </div>

  <div class="grid lg:grid-cols-3 gap-6 mb-8">

    <div class="glass rounded-3xl p-6 shadow-lg">
      <h3 class="text-2xl font-black mb-4">Planning Progress</h3>

      <div class="w-full bg-gray-200 rounded-full h-5">
        <div id="progressBar" class="bg-rose-500 h-5 rounded-full"></div>
      </div>

      <p id="progressText" class="mt-4 text-gray-600 font-semibold"></p>
    </div>

    <div class="glass rounded-3xl p-6 shadow-lg">
      <h3 class="text-2xl font-black mb-4">Quick Stats</h3>

      <div class="space-y-3">
        <p>Total Tasks: <span id="taskCount" class="font-bold"></span></p>
        <p>Completed Tasks: <span id="completedCount" class="font-bold"></span></p>
        <p>Total Vendors: <span id="vendorCount" class="font-bold"></span></p>
      </div>
    </div>

    <div class="glass rounded-3xl p-6 shadow-lg">
      <h3 class="text-2xl font-black mb-4">Upcoming Deadlines</h3>

      <ul id="upcomingList" class="space-y-2"></ul>
    </div>

  </div>

  <div class="grid lg:grid-cols-2 gap-8">

    <!-- TASKS -->

    <div class="glass rounded-3xl p-6 shadow-lg">

      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-black">Wedding Tasks</h2>

        <button onclick="showTaskModal()"
          class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-3 rounded-2xl">
          + Add Task
        </button>
      </div>

      <div id="taskList" class="space-y-4 max-h-[700px] overflow-y-auto"></div>

    </div>

    <!-- VENDORS -->

    <div class="glass rounded-3xl p-6 shadow-lg">

      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-black">Vendor Tracker</h2>

        <button onclick="showVendorModal()"
          class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-3 rounded-2xl">
          + Add Vendor
        </button>
      </div>

      <div id="vendorList" class="space-y-4"></div>

    </div>

  
  <!-- PURCHASE ITEMS -->

  <div class="glass rounded-3xl p-6 shadow-lg mt-8">

    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-black">Items To Purchase</h2>
    </div>

    <div class="flex gap-4 mb-6">

      <input id="purchaseItemInput"
        class="flex-1 border rounded-2xl p-3"
        placeholder="Example: Bible, Reserved Pew Hangs">

      <button onclick="addPurchaseItem()"
        class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-3 rounded-2xl">
        Add Item
      </button>

    
      <textarea id="purchaseLinks"
        class="w-full border rounded-2xl p-3 mt-4"
        rows="4"
        placeholder="Paste product links here (one per line)"></textarea>


    </div>

    <div id="purchaseList" class="space-y-3"></div>

  </div>


</div>

<!-- TASK MODAL -->

<div id="taskModal"
  class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-6 z-50">

  <div class="bg-white rounded-3xl p-6 w-full max-w-lg">

    <h2 class="text-3xl font-black mb-6">Add Wedding Task</h2>

    <div class="space-y-4">

      <input id="taskTitle"
        class="w-full border rounded-2xl p-3"
        placeholder="Task Title">

      <input id="taskCategory"
        class="w-full border rounded-2xl p-3"
        placeholder="Category">

      <input id="taskDeadline"
        type="date"
        class="w-full border rounded-2xl p-3">

      <select id="taskPriority"
        class="w-full border rounded-2xl p-3">

        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
        <option>Critical</option>

      </select>

      <select id="taskStatus"
        class="w-full border rounded-2xl p-3">

        <option>Not Started</option>
        <option>Researching</option>
        <option>Waiting</option>
        <option>In Progress</option>
        <option>Almost Done</option>
        <option>Completed</option>

      </select>

      <input id="taskProgress"
        type="range"
        min="0"
        max="100"
        value="0"
        class="w-full">
      <select id="taskVendor"
        class="w-full border rounded-2xl p-3">
        <option value="">Associated Vendor</option>
      </select>

      <label class="text-sm font-semibold">Attach File</label>

      <input id="taskFile"
        type="file"
        class="w-full border rounded-2xl p-3">


      <div class="flex gap-4">

        <button onclick="addTask()"
          class="bg-rose-500 text-white flex-1 py-3 rounded-2xl">
          Save Task
        </button>

        <button onclick="hideTaskModal()"
          class="bg-gray-200 flex-1 py-3 rounded-2xl">
          Cancel
        </button>

      </div>

    </div>

  </div>

</div>

<!-- VENDOR MODAL -->

<div id="vendorModal"
  class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-6 z-50">

  <div class="bg-white rounded-3xl p-6 w-full max-w-lg">

    <h2 class="text-3xl font-black mb-6">Add Vendor</h2>

    <div class="space-y-4">

      <input id="vendorName"
        class="w-full border rounded-2xl p-3"
        placeholder="Vendor Name">

      <input id="vendorCategory"
        class="w-full border rounded-2xl p-3"
        placeholder="Category">

      <input id="vendorContact"
        class="w-full border rounded-2xl p-3"
        placeholder="Contact Person">

      <input id="vendorEmail"
        class="w-full border rounded-2xl p-3"
        placeholder="Email">

      <input id="vendorPhone"
        class="w-full border rounded-2xl p-3"
        placeholder="Phone">

      <input id="vendorDeposit"
        class="w-full border rounded-2xl p-3"
        placeholder="Deposit Amount">

      <div class="flex gap-4">

        <button onclick="addVendor()"
          class="bg-rose-500 text-white flex-1 py-3 rounded-2xl">
          Save Vendor
        </button>

        <button onclick="hideVendorModal()"
          class="bg-gray-200 flex-1 py-3 rounded-2xl">
          Cancel
        </button>

      </div>

    </div>

  </div>

</div>

<script>

/*
REALTIME DATABASE RULES:

{
  "rules": {
    ".read": true,
    ".write": true
  }
}
*/

const firebaseConfig = {

  apiKey: "AIzaSyBMcWHdQxCDe6lcq184A0Be7hhTrTqHba8",

  authDomain: "wedding-planning-e89c7.firebaseapp.com",

  databaseURL: "https://wedding-planning-e89c7-default-rtdb.firebaseio.com",

  projectId: "wedding-planning-e89c7",

  storageBucket: "wedding-planning-e89c7.appspot.com",

  messagingSenderId: "101109655856",

  appId: "1:101109655856:web:dc3934ec574f65ddd840f5"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const tasksRef = db.ref("tasks");
const vendorsRef = db.ref("vendors");
const purchasesRef = db.ref("purchases");

let tasks = [];
let vendors = [];
let purchases = [];



/* COUNTDOWN */

function updateCountdown() {

  const weddingDate = new Date("2026-07-09");
  const today = new Date();

  const diff = weddingDate - today;

  const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

  document.getElementById("countdown").textContent = days + " Days";
}

updateCountdown();

/* MODALS */

function showTaskModal() {
  document.getElementById("taskModal").classList.remove("hidden");
}

function hideTaskModal() {
  document.getElementById("taskModal").classList.add("hidden");
}

function showVendorModal() {
  document.getElementById("vendorModal").classList.remove("hidden");
}

function hideVendorModal() {
  document.getElementById("vendorModal").classList.add("hidden");
}

/* REALTIME LISTENERS */

tasksRef.on("value", (snapshot) => {

  const data = snapshot.val();

  tasks = [];

  if(data) {

    Object.keys(data).forEach((key) => {

      tasks.push({
        id: key,
        ...data[key]
      });

    });

  }

  renderTasks();

});

vendorsRef.on("value", (snapshot) => {

  const data = snapshot.val();

  vendors = [];

  if(data) {

    Object.keys(data).forEach((key) => {

      vendors.push({
        id: key,
        ...data[key]
      });

    });

  }

  renderVendors();
  populateVendorDropdown();

});



/* PURCHASE LISTENER */

purchasesRef.on("value", (snapshot) => {

  const data = snapshot.val();

  purchases = [];

  if(data) {

    Object.keys(data).forEach((key) => {

      purchases.push({
        id: key,
        ...data[key]
      });

    });

  }

  renderPurchases();

});


/* RENDER TASKS */

function renderTasks() {

  const container = document.getElementById("taskList");

  container.innerHTML = "";

  tasks.sort((a,b) =>
    new Date(a.deadline) - new Date(b.deadline)
  );

  tasks.forEach((task) => {

    const div = document.createElement("div");

    div.className = "bg-white rounded-2xl p-5 shadow";

    div.innerHTML = `

      <div class="flex justify-between items-start">

        <div>

          <h3 class="text-xl font-bold">${task.title}</h3>

          <p class="text-gray-500">${task.category}</p>

          <p class="text-sm mt-2">
            Deadline: ${task.deadline}
          </p>

          <p class="text-sm">
            Priority: ${task.priority}
          </p>

          <p class="text-sm">
            Status: ${task.status}
          </p>

          <p class="text-sm">
            Vendor: ${task.vendor || "None"}
          </p>

          ${task.fileName ? `
            <p class="text-sm text-blue-600 mt-1">
              📎 ${task.fileName}
            </p>
          ` : ""}

          <div class="flex gap-2 mt-3">

            <select
              onchange="updateTaskPriority('${task.id}', this.value)"
              class="border rounded-lg p-1 text-sm">

              ${['Low','Medium','High','Critical']
                .map(p => `
                  <option
                    value="${p}"
                    ${task.priority === p ? 'selected' : ''}>
                    ${p}
                  </option>
                `).join('')}

            </select>

            <input
              type="range"
              min="0"
              max="100"
              value="${task.progress}"
              onchange="updateTaskProgress('${task.id}', this.value)"
              class="w-32">

            <button
              onclick="markTaskComplete('${task.id}')"
              class="bg-green-500 text-white px-2 py-1 rounded text-xs">
              Complete
            </button>

          </div>

        </div>

        <button
          onclick="deleteTask('${task.id}')"
          class="text-red-500 font-bold">
          ✕
        </button>

      </div>

      <div class="mt-4 w-full bg-gray-200 rounded-full h-3">

        <div
          class="bg-rose-500 h-3 rounded-full"
          style="width:${task.progress}%">
        </div>

      </div>

      <p class="text-sm mt-2">
        ${task.progress}% Complete
      </p>

    `;

    container.appendChild(div);

  });

  updateStats();

  renderUpcoming();
}

/* RENDER VENDORS */

function renderVendors() {

  const container = document.getElementById("vendorList");

  container.innerHTML = "";

  vendors.forEach((vendor) => {

    const div = document.createElement("div");

    div.className = "bg-white rounded-2xl p-5 shadow";

    div.innerHTML = `

      <div class="flex justify-between items-start">

        <div>

          <h3 class="text-xl font-bold">${vendor.name}</h3>

          <p class="text-gray-500">${vendor.category}</p>

          <p class="text-sm mt-2">${vendor.contact}</p>

          <p class="text-sm">${vendor.email}</p>

          <p class="text-sm">${vendor.phone}</p>

        </div>

        <button
          onclick="deleteVendor('${vendor.id}')"
          class="text-red-500 font-bold">
          ✕
        </button>

      </div>

    `;

    container.appendChild(div);

  });

  document.getElementById("vendorCount").textContent =
    vendors.length;
}



/* POPULATE VENDOR DROPDOWN */

function populateVendorDropdown() {

  const select =
    document.getElementById("taskVendor");

  select.innerHTML =
    '<option value="">Associated Vendor</option>';

  vendors.forEach((vendor) => {

    select.innerHTML += `
      <option value="${vendor.name}">
        ${vendor.name}
      </option>
    `;

  });

}


/* STATS */

function updateStats() {

  const completed =
    tasks.filter(t => t.progress >= 100).length;

  const percent =
    tasks.length > 0
      ? Math.round((completed / tasks.length) * 100)
      : 0;

  document.getElementById("taskCount").textContent =
    tasks.length;

  document.getElementById("completedCount").textContent =
    completed;

  document.getElementById("progressBar").style.width =
    percent + "%";

  document.getElementById("progressText").textContent =
    percent + "% Complete";
}

/* UPCOMING */

function renderUpcoming() {

  const upcoming = [...tasks]
    .filter(t => t.progress < 100)
    .slice(0,5);

  document.getElementById("upcomingList").innerHTML =
    upcoming.map(task => `

      <li class="bg-white rounded-xl p-3 shadow-sm">

        <strong>${task.title}</strong><br>

        <span class="text-gray-500 text-sm">
          ${task.deadline}
        </span>

      </li>

    `).join("");
}



/* RENDER PURCHASES */

function renderPurchases() {

  const container =
    document.getElementById("purchaseList");

  container.innerHTML = "";

  purchases.forEach((item) => {

    const div = document.createElement("div");

    div.className =
      "bg-white rounded-2xl p-4 shadow flex justify-between items-center";

    div.innerHTML = `

      <div class="flex items-center gap-3">

        <input
          type="checkbox"
          ${item.purchased ? "checked" : ""}
          onchange="togglePurchase('${item.id}', this.checked)"
          class="w-5 h-5">


        <span class="${item.purchased ? 'line-through text-gray-400' : ''}">
          ${item.name}
        </span>

        ${item.links ? `
          <div class="mt-2 text-sm space-y-1">
            ${item.links.map(link => `
              <a
                href="${link}"
                target="_blank"
                class="block text-blue-600 underline break-all">
                ${link}
              </a>
            `).join('')}
          </div>
        ` : ""}


      </div>

      <button
        onclick="deletePurchase('${item.id}')"
        class="text-red-500 font-bold">
        ✕
      </button>

    `;

    container.appendChild(div);

  });

}

/* ADD PURCHASE ITEM */

async function addPurchaseItem() {

  try {

    const input =
      document.getElementById("purchaseItemInput");

    const name = input.value.trim();

    if(!name) {

      alert("Please enter an item.");
      return;
    }

    const linksRaw =
      document.getElementById("purchaseLinks").value;

    const links =
      linksRaw
        .split("\n")
        .map(link => link.trim())
        .filter(link => link);

    await purchasesRef.push({

      name: name,
      purchased: false,
      links: links

    });

    document.getElementById("purchaseLinks").value = "";

    input.value = "";

  } catch(error) {

    console.error(error);

    alert("Firebase Error: " + error.message);
  }

}

/* TOGGLE PURCHASE */

async function togglePurchase(id, value) {

  await purchasesRef.child(id).update({
    purchased: value
  });

}

/* DELETE PURCHASE */

async function deletePurchase(id) {

  await purchasesRef.child(id).remove();

}


/* ADD TASK */

async function addTask() {

  try {

    const fileInput =
      document.getElementById("taskFile");

    const file =
      fileInput.files[0];

    const task = {

      title: document.getElementById("taskTitle").value,

      category: document.getElementById("taskCategory").value,

      deadline: document.getElementById("taskDeadline").value,

      priority: document.getElementById("taskPriority").value,

      status: document.getElementById("taskStatus").value,

      vendor: document.getElementById("taskVendor").value,

      progress: Number(
        document.getElementById("taskProgress").value
      ),

      completed: false,

      fileName: file ? file.name : ""

    };

    if(!task.title) {

      alert("Please enter a task title.");
      return;
    }

    await tasksRef.push(task);

    alert("Task saved!");

    hideTaskModal();

  } catch(error) {

    console.error(error);

    alert("Firebase Error: " + error.message);
  }
}

/* ADD VENDOR */

async function addVendor() {

  try {

    const vendor = {

      name: document.getElementById("vendorName").value,

      category: document.getElementById("vendorCategory").value,

      contact: document.getElementById("vendorContact").value,

      email: document.getElementById("vendorEmail").value,

      phone: document.getElementById("vendorPhone").value,

      deposit: document.getElementById("vendorDeposit").value

    };

    if(!vendor.name) {

      alert("Please enter a vendor name.");
      return;
    }

    await vendorsRef.push(vendor);

    alert("Vendor saved!");

    hideVendorModal();

  } catch(error) {

    console.error(error);

    alert("Firebase Error: " + error.message);
  }
}



/* UPDATE TASK PRIORITY */

async function updateTaskPriority(id, value) {

  await tasksRef.child(id).update({
    priority: value
  });

}

/* UPDATE TASK PROGRESS */

async function updateTaskProgress(id, value) {

  const progress = Number(value);

  await tasksRef.child(id).update({
    progress: progress
  });

}

/* MARK TASK COMPLETE */

async function markTaskComplete(id) {

  await tasksRef.child(id).update({

    progress: 100,
    status: "Completed",
    completed: true

  });

}


/* DELETE TASK */

async function deleteTask(id) {

  await tasksRef.child(id).remove();
}

/* DELETE VENDOR */

async function deleteVendor(id) {

  await vendorsRef.child(id).remove();
}
